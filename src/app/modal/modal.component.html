<div class="modal-custom">
  <div class="modal-header">
    <div class="title-wrap">
      <div class="modal-badge">✓</div>
      <div>
        <h5 class="modal-title">Confirm Submission</h5>
        <p class="modal-sub">Review your selection and save changes</p>
      </div>
    </div>

    <button type="button" class="close-btn" aria-label="Close" (click)="modalRef.close()">×</button>
  </div>

  <div class="modal-body">
    <div class="body-content">
      <p class="lead">You're about to submit your selection.</p>
      <p class="muted">Make sure the selected option is correct before saving.</p>
    </div>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-outline-secondary" (click)="cancel()">Cancel</button>
    <button type="button" class="btn btn-primary" (click)="save()">Save changes</button>
  </div>
</div>
